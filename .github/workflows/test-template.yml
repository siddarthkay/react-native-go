name: Test Template

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test-template-ios:
    name: Template → iOS Build
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: devenv
          skipPush: true

      - name: Generate project from template
        run: nix develop --command bash -c 'bash cli/build-template.sh && node cli/bin.js test-app --bundleId com.ci.testapp --goModule ci.test/test-app'

      - name: Verify no leftover identifiers
        run: |
          cd test-app
          if grep -r "rn-golang" --include="*.go" --include="*.ts" --include="*.json" --include="*.kt" --include="*.swift" --include="*.pbxproj" --include="*.plist" .; then
            echo "ERROR: Found leftover 'rn-golang' references"
            exit 1
          fi
          if grep -r "io.rngolang.app" .; then
            echo "ERROR: Found leftover 'io.rngolang.app' references"
            exit 1
          fi
          if grep -r "siddarthkay/react-native-go" .; then
            echo "ERROR: Found leftover Go module references"
            exit 1
          fi
          echo "All identifiers replaced correctly"

      - name: Build Go backend and iOS app
        run: nix develop --command bash -c 'make -C test-app/backend setup && make -C test-app/backend ios && make -C test-app/mobile-app ios'
        env:
          YARN_ENABLE_HARDENED_MODE: 0
          YARN_ENABLE_IMMUTABLE_INSTALLS: false

  test-template-android:
    name: Template → Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: devenv
          skipPush: true

      - name: Generate project from template
        run: nix develop --command bash -c 'bash cli/build-template.sh && node cli/bin.js test-app --bundleId com.ci.testapp --goModule ci.test/test-app'

      - name: Verify no leftover identifiers
        run: |
          cd test-app
          if grep -r "rn-golang" --include="*.go" --include="*.ts" --include="*.json" --include="*.kt" --include="*.swift" --include="*.pbxproj" --include="*.plist" .; then
            echo "ERROR: Found leftover 'rn-golang' references"
            exit 1
          fi
          if grep -r "io.rngolang.app" .; then
            echo "ERROR: Found leftover 'io.rngolang.app' references"
            exit 1
          fi
          if grep -r "siddarthkay/react-native-go" .; then
            echo "ERROR: Found leftover Go module references"
            exit 1
          fi
          echo "All identifiers replaced correctly"

      - name: Build Go backend and Android app
        run: nix develop --command bash -c 'make -C test-app/backend setup && make -C test-app/backend android && make -C test-app/mobile-app android'
        env:
          YARN_ENABLE_HARDENED_MODE: 0
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
