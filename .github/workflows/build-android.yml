name: Build Android

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Go backend for Android
        run: nix develop --command bash -c 'make -C backend setup && make -C backend test && make -C backend vet && make -C backend android'

      - name: Build Android APK
        run: nix develop --command bash -c 'make -C mobile-app android'

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
