name: Build Android

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            mobile-app/.yarn/cache
            mobile-app/.yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('mobile-app/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Go backend
        run: make -C backend setup

      - name: Test Go backend
        run: make -C backend test && make -C backend vet

      - name: Build Go backend for Android
        run: make -C backend android

      - name: Install Node dependencies
        run: make -C mobile-app install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build Release APK
        run: make -C mobile-app build-android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Stop Gradle daemon
        if: always()
        working-directory: mobile-app/android
        run: ./gradlew --stop
